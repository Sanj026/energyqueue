#version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: energyqueue_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  app:
    build: .
    container_name: energyqueue_app
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - CARBON_THRESHOLD=200
      - ENERGY_BUDGET_GRAMS=500
    volumes:
      - .:/app
    working_dir: /app

  metrics:
    build: .
    command: python metrics.py
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - CARBON_THRESHOLD=200
      - ENERGY_BUDGET_GRAMS=500
      - ELECTRICITY_MAPS_API_KEY=${ELECTRICITY_MAPS_API_KEY}
      - GRID_ZONE=GB
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=energyqueue
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
  

volumes:
  redis_data:
  grafana_data: