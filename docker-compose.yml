#version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: energyqueue_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  app:
    build: .
    container_name: energyqueue_app
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - CARBON_THRESHOLD=200
      - ENERGY_BUDGET_GRAMS=500
    volumes:
      - .:/app
    working_dir: /app

volumes:
  redis_data: